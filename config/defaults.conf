# Willow-Arch default configuration
#
# These defaults are intentionally conservative. Override them from the
# environment or future CLI flags instead of editing installer internals.

RUN_TUI=1

DEFAULT_LOCALE="en_US.UTF-8"
DEFAULT_KEYMAP="us"
BTRFS_MOUNT_OPTS="ssd,noatime,compress-force=zstd:3,discard=async"

# Persistent debug log. Override LOG_DIR or LOG_FILE from the environment if needed.
LOG_ENABLED=1
LOG_DIR="/tmp/willow-arch"
LOG_TARGET_DIR="/mnt/var/log/willow-arch"

